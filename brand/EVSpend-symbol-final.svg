<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0F1612"/>
      <stop offset="100%" stop-color="#0A0F0D"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="atmoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  
  <ellipse cx="256" cy="256" rx="155" ry="105"
           fill="#10E0A0" opacity="0.07" filter="url(#atmoGlow)"/>

  <!-- Outer glow trace (dezent) -->
  <g stroke="#10E0A0" stroke-width="30"
     stroke-linecap="round" stroke-linejoin="round" fill="none"
     opacity="0.18" filter="url(#softGlow)">
    <path d="M 256 180 L 202.24 225.33"/>
    <path d="M 181.76 242.59 L 128 287.92"/>
    <path d="M 256 180 L 384 287.92"/>
  </g>

  <!-- Sharp chevron with notch -->
  <g stroke="#10E0A0" stroke-width="30"
     stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 256 180 L 202.24 225.33"/>
    <path d="M 181.76 242.59 L 128 287.92"/>
    <path d="M 256 180 L 384 287.92"/>
  </g>

  <!-- Geometric diamond spark -->
  <path d="M 192.00 221.36 L 204.60 233.96 L 192.00 246.56 L 179.40 233.96 Z" fill="#10E0A0"/>
</svg>
